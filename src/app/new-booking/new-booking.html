<div class="booking-container d-flex justify-content-center">
    <form [formGroup]="bookingForm" (ngSubmit)="onSearch()" class="booking-form card p-4">
        <div class="row g-3 align-items-end">

            <!-- Hotel -->
            <div class="col-md-3">
                <label class="form-label fw-semibold">Hotel</label>
                <select class="form-select" formControlName="destination">
                    <option value="">Select hotel</option>
                    @for (hotel of hotels; track hotel) {
                    <option [value]="hotel">{{ hotel }}</option>
                    }
                </select>
            </div>

            <!-- Check-in -->
            <div class="col-md-3">
                <label class="form-label fw-semibold">Check-in</label>
                <input type="date" class="form-control" formControlName="checkin">
            </div>

            <!-- Check-out -->
            <div class="col-md-3">
                <label class="form-label fw-semibold">Check-out</label>
                <input type="date" class="form-control" formControlName="checkout">
            </div>

            <!-- Travellers -->
            <div class="col-md-2">
                <label class="form-label fw-semibold">Travellers</label>
                <input type="number" min="1" class="form-control" formControlName="travellers" placeholder="2">
            </div>

            <!-- Search -->
            <div class="col-md-1 d-grid search-col">
                <button type="submit" class="btn search-btn" [disabled]="bookingForm.invalid">
                    Search
                </button>
            </div>

        </div>
    </form>
</div>

<!-- ROOM RESULTS -->
<div class="container">
    <div class="row g-4">

        @for (room of roomList; track room.roomId) {
        <div class="col-md-4 col-sm-6">
            <div class="card room-card h-100 border-3" [ngClass]="getRoomClass(room)">
                <div class="card-body">

                    <h5 class="fw-bold">
                        Room {{ room.roomNumber }}
                    </h5>

                    <p class="mb-1">
                        <strong>Type:</strong> {{ room.roomType }}
                    </p>

                    <!-- PRICE (GREEN FOR AVAILABLE) -->
                    <p class="mb-1 price">
                        <strong>Price:</strong> ₹{{ room.price }}
                    </p>

                    <span class="badge" [ngClass]="{
                            'bg-success': room.roomStatus === 'AVAILABLE',
                            'bg-warning text-dark': room.roomStatus === 'CONFIRMED',
                            'bg-danger': room.roomStatus === 'CHECKED_IN'
                        }">
                        {{ room.roomStatus }}
                    </span>

                    <!-- Only allow booking if available -->
                    <button *ngIf="room.roomStatus === 'AVAILABLE'" class="btn btn-success w-100 mt-3"
                        (click)="bookNow(room)">
                        Book Now
                    </button>

                </div>
            </div>
        </div>
        }

    </div>
</div>
