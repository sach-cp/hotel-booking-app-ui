<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center bg-light">
    <div class="col-12 col-md-6 col-lg-4">

        <div class="card shadow-lg rounded-4">
            <div class="card-body p-3">

                <h2 class="text-center fw-bold mb-4">Create Account</h2>

                <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

                    <!-- Full Name -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" class="form-control form-control-lg" formControlName="fullName"
                            placeholder="Enter full name" />
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control form-control-lg" formControlName="email"
                            placeholder="Enter email" />
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg" formControlName="password"
                            placeholder="Enter password" />
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" class="form-control form-control-lg" formControlName="confirmPassword"
                            placeholder="Re-enter password" />
                    </div>

                    <!-- Submit -->
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-semibold"
                            [disabled]="signupForm.invalid">
                            Sign Up
                        </button>
                    </div>

                </form>

                <p class="text-center mt-4 mb-0">
                    Already have an account?
                    <a routerLink="/login" class="fw-semibold text-decoration-none">
                        Login
                    </a>
                </p>

            </div>
        </div>

    </div>
</div>
