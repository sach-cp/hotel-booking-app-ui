<div class="login-container">
  <div class="container-fluid">
    <div class="row justify-content-center align-items-center">
      <div class="col-1 col-md-1 col-lg-4">
        <div class="card login-card shadow-lg">
          <div class="card-body auth-body">

            <!-- Header -->
            <div class="text-center">
              <h2 class="card-title fw-bold">Create Account</h2>
              <p class="text-muted">Sign up to get started</p>
            </div>

            <!-- Form -->
            <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">

              <!-- Full Name -->
              <div class="mb-1">
                <label class="form-label fw-semibold">Full Name</label>
                <input
                  type="text"
                  class="form-control form-control-lg"
                  formControlName="fullName"
                  placeholder="Enter full name"
                  required
                />
              </div>

              <!-- Email -->
              <div class="mb-1">
                <label class="form-label fw-semibold">Email</label>
                <input
                  type="email"
                  class="form-control form-control-lg"
                  formControlName="email"
                  placeholder="Enter email"
                  required
                />
              </div>

              <!-- Password -->
              <div class="mb-1">
                <label class="form-label fw-semibold">Password</label>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  formControlName="password"
                  placeholder="Enter password"
                  required
                />
              </div>

              <!-- Confirm Password -->
              <div class="mb-1">
                <label class="form-label fw-semibold">Confirm Password</label>
                <input
                  type="password"
                  class="form-control form-control-lg"
                  formControlName="confirmPassword"
                  placeholder="Re-enter password"
                  required
                />
              </div>

              <!-- Submit -->
              <div class="d-grid mb-2">
                <button
                  type="submit"
                  class="btn btn-primary btn-lg fw-semibold"
                  [disabled]="signupForm.invalid"
                >
                  Sign Up
                </button>
              </div>

            </form>

            <!-- Footer -->
            <div class="mt-1 pt-1 border-top text-center">
              <p class="text-muted mb-0">
                Already have an account?
                <a routerLink="/login" class="fw-semibold text-decoration-none">
                  Login
                </a>
              </p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</div>
